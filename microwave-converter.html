<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Micro-ondes · Convertisseur</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c2825">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Micro·ondes">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --warm-white: #faf7f2;
    --charcoal: #2c2825;
    --ember: #c94f1e;
    --amber: #e8903a;
    --sand: #d4c4a8;
    --muted: #8c7f72;
    --panel: #ece6db;
  }

  body {
    background: var(--cream);
    color: var(--charcoal);
    font-family: 'DM Sans', sans-serif;
    height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  .app {
    width: 100%;
    max-width: 420px;
    height: 100svh;
    display: flex;
    flex-direction: column;
    padding: 0 0 env(safe-area-inset-bottom, 0px);
  }

  /* Header */
  header {
    padding: max(10px, env(safe-area-inset-top)) 20px 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-icon {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    background: var(--charcoal);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-icon svg {
    width: 17px;
    height: 17px;
    fill: none;
    stroke: var(--amber);
    stroke-width: 1.8;
    stroke-linecap: round;
  }

  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    line-height: 1.1;
    color: var(--charcoal);
    letter-spacing: -0.02em;
  }

  .header-text h1 span {
    color: var(--ember);
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.3;
    margin-top: 1px;
  }

  /* Cards */
  .card {
    margin: 0 12px 6px;
    background: var(--warm-white);
    border-radius: 16px;
    padding: 10px 14px;
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 2px 8px rgba(44,40,37,0.06);
  }

  .card-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* Time Input */
  .time-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .time-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time-block label {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .time-block input {
    width: 100%;
    background: var(--panel);
    border: 2px solid transparent;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 1.9rem;
    font-weight: 500;
    color: var(--charcoal);
    text-align: center;
    padding: 5px 4px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -moz-appearance: textfield;
  }

  .time-block input::-webkit-outer-spin-button,
  .time-block input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .time-block input:focus {
    border-color: var(--amber);
    background: var(--warm-white);
  }

  .time-sep {
    font-family: 'DM Mono', monospace;
    font-size: 1.7rem;
    font-weight: 500;
    color: var(--sand);
    padding-bottom: 14px;
  }

  /* Watt selector */
  .watt-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .watt-btn {
    background: var(--panel);
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 5px 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .watt-btn .w-val {
    display: block;
    font-size: 0.9rem;
    color: var(--charcoal);
    margin-bottom: 0;
  }

  .watt-btn:hover {
    border-color: var(--sand);
    background: var(--cream);
  }

  .watt-btn.active {
    background: var(--charcoal);
    border-color: var(--charcoal);
    color: var(--sand);
    box-shadow: 0 2px 8px rgba(44,40,37,0.2);
  }

  .watt-btn.active .w-val {
    color: var(--amber);
  }

  .watt-custom-row {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .watt-custom-row label {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 400;
  }

  .watt-custom-row input {
    flex: 1;
    background: var(--panel);
    border: 2px solid transparent;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--charcoal);
    text-align: center;
    padding: 5px 8px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .watt-custom-row input::-webkit-outer-spin-button,
  .watt-custom-row input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .watt-custom-row input:focus {
    border-color: var(--amber);
  }

  /* Arrow / divider */
  .convert-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .convert-arrow svg {
    width: 18px;
    height: 18px;
    stroke: var(--sand);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Result */
  .result-card {
    margin: 0 12px 0;
    background: var(--charcoal);
    border-radius: 16px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 4px 16px rgba(44,40,37,0.18);
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: opacity 0.3s;
    justify-content: center;
    flex: 1;
  }

  .result-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .result-time {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--warm-white);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .result-time .unit {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--sand);
    margin-left: 4px;
    letter-spacing: 0;
  }

  .result-hint {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 2px;
  }

  .result-hint strong {
    color: var(--amber);
    font-weight: 500;
  }

  .result-empty {
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 300;
    font-style: italic;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-time { animation: fadeUp 0.25s ease; }

</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <path d="M18 9v6M15 9l1.5 3L18 9"/>
        <circle cx="7" cy="12" r="2.5"/>
        <path d="M2 9h20"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Micro<span>·</span>ondes Convertisseur</h1>
      <p class="subtitle">Adapte le temps à la puissance de ton four.</p>
    </div>
  </header>

  <!-- Temps de référence -->
  <div class="card">
    <div class="card-label">Temps indiqué sur l'emballage</div>
    <div class="time-input-row">
      <div class="time-block">
        <input type="number" id="refMin" min="0" max="99" value="2" placeholder="00">
        <label>min</label>
      </div>
      <div class="time-sep">:</div>
      <div class="time-block">
        <input type="number" id="refSec" min="0" max="59" value="0" placeholder="00">
        <label>sec</label>
      </div>
    </div>
  </div>

  <!-- Puissance de référence -->
  <div class="card">
    <div class="card-label">Puissance de référence (W)</div>
    <div class="watt-grid" id="refGrid"></div>
    <div class="watt-custom-row">
      <label>Autre&nbsp;:</label>
      <input type="number" id="refCustom" min="100" max="3000" placeholder="ex. 850">
    </div>
  </div>

  <div class="convert-arrow">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M6 13l6 6 6-6"/></svg>
  </div>

  <!-- Puissance souhaitée -->
  <div class="card">
    <div class="card-label">Puissance de ton four (W)</div>
    <div class="watt-grid" id="myGrid"></div>
    <div class="watt-custom-row">
      <label>Autre&nbsp;:</label>
      <input type="number" id="myCustom" min="100" max="3000" placeholder="ex. 750">
    </div>
  </div>

  <!-- Résultat -->
  <div class="result-card" id="resultCard">
    <div class="result-label">Temps converti</div>
    <div id="resultContent" class="result-empty">Remplis les champs ci-dessus</div>
  </div>


</div>

<script>
const WATTS = [600, 700, 750, 800, 850, 900, 1000, 1200];

let refWatt = 800;
let myWatt  = 700;

function makeGrid(containerId, current, onSelect) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  WATTS.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'watt-btn' + (w === current ? ' active' : '');
    btn.innerHTML = `<span class="w-val">${w}</span>W`;
    btn.addEventListener('click', () => {
      onSelect(w);
      // clear custom
      const customId = containerId === 'refGrid' ? 'refCustom' : 'myCustom';
      document.getElementById(customId).value = '';
    });
    grid.appendChild(btn);
  });
}

function updateRefGrid() {
  makeGrid('refGrid', refWatt, (w) => { refWatt = w; updateRefGrid(); compute(); });
}

function updateMyGrid() {
  makeGrid('myGrid', myWatt, (w) => { myWatt = w; updateMyGrid(); compute(); });
}

function totalSeconds() {
  const m = parseInt(document.getElementById('refMin').value) || 0;
  const s = parseInt(document.getElementById('refSec').value) || 0;
  return m * 60 + s;
}

function formatTime(totalSec) {
  const m = Math.floor(totalSec / 60);
  const s = Math.round(totalSec % 60);
  if (m === 0) return { display: `${s}`, unit: 'sec' };
  if (s === 0) return { display: `${m}`, unit: m > 1 ? 'min' : 'min' };
  return { display: `${m}<span class="unit">min</span> ${s.toString().padStart(2,'0')}`, unit: 'sec' };
}

function compute() {
  const tRef = totalSeconds();
  const content = document.getElementById('resultContent');

  if (tRef <= 0 || refWatt <= 0 || myWatt <= 0) {
    content.className = 'result-empty';
    content.innerHTML = 'Remplis les champs ci-dessus';
    return;
  }

  const tNew = tRef * refWatt / myWatt;
  const m = Math.floor(tNew / 60);
  const s = Math.round(tNew % 60);

  let timeStr;
  if (m === 0) {
    timeStr = `${s}<span class="unit">sec</span>`;
  } else if (s === 0) {
    timeStr = `${m}<span class="unit">min</span>`;
  } else {
    timeStr = `${m}<span class="unit">min</span>&nbsp;${s.toString().padStart(2,'0')}<span class="unit">sec</span>`;
  }

  const diff = Math.round(tNew - tRef);
  const diffStr = diff > 0
    ? `+${diff} sec de plus qu'indiqué`
    : diff < 0
    ? `${Math.abs(diff)} sec de moins qu'indiqué`
    : `Même durée qu'indiqué`;

  content.className = 'result-time';
  content.innerHTML = `${timeStr}<br><span class="result-hint" style="font-family:'DM Sans';font-size:.8rem;color:var(--muted);font-weight:300"><strong>${myWatt}W</strong> · ${diffStr}</span>`;
}

// Custom watt inputs
document.getElementById('refCustom').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  if (v >= 100 && v <= 3000) {
    refWatt = v;
    // deselect grid
    document.querySelectorAll('#refGrid .watt-btn').forEach(b => b.classList.remove('active'));
    compute();
  }
});

document.getElementById('myCustom').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  if (v >= 100 && v <= 3000) {
    myWatt = v;
    document.querySelectorAll('#myGrid .watt-btn').forEach(b => b.classList.remove('active'));
    compute();
  }
});

// Time inputs
document.getElementById('refMin').addEventListener('input', () => {
  let v = parseInt(document.getElementById('refMin').value);
  if (isNaN(v) || v < 0) v = 0;
  if (v > 99) v = 99;
  document.getElementById('refMin').value = v;
  compute();
});

document.getElementById('refSec').addEventListener('input', () => {
  let v = parseInt(document.getElementById('refSec').value);
  if (isNaN(v) || v < 0) v = 0;
  if (v > 59) { v = 59; }
  document.getElementById('refSec').value = v;
  compute();
});

// Init
updateRefGrid();
updateMyGrid();
compute();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
